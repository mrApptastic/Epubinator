<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Epubinator</title>
    <!-- GitHub Pages base path -->
    <base href="/Epubinator/" />
    <link rel="preload" id="webassembly" />

    <!-- Bootstrap (bundled locally from template) -->
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />

    <!-- Font Awesome icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- App styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Epubinator.Client.styles.css" rel="stylesheet" />

    <!-- PWA -->
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <meta name="theme-color" content="#0d6efd" />

    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <!-- Initial loading indicator while Blazor WASM boots -->
        <div style="display:flex;align-items:center;justify-content:center;height:100dvh;
                    font-family:system-ui,sans-serif;color:#6c757d;flex-direction:column;gap:12px">
            <div style="width:40px;height:40px;border:3px solid #dee2e6;border-top-color:#0d6efd;
                        border-radius:50%;animation:spin 0.8s linear infinite"></div>
            <span>Loading Epubinator&hellip;</span>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3 d-none" role="alert">
        An unhandled error has occurred.
        <a href="." class="alert-link ms-1">Reload</a>
        <button type="button" class="btn-close float-end"
                onclick="this.closest('#blazor-error-ui').classList.add('d-none')"></button>
    </div>

    <!-- SPA redirect from 404.html -->
    <script>
        (function () {
            var redirect = sessionStorage.getItem('spa-redirect');
            if (redirect) {
                sessionStorage.removeItem('spa-redirect');
                window.history.replaceState(null, '', redirect);
            }
        })();
    </script>

    <!-- Dexie.js for IndexedDB -->
    <script src="https://unpkg.com/dexie@4.0.9/dist/dexie.js"></script>

    <!-- Epubinator JS interop layer (Dexie, theme, scroll, SW update) -->
    <script src="js/interop.js"></script>

    <!-- Bootstrap JS bundle (required for Offcanvas, Tabs, etc.) -->
    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Blazor WebAssembly runtime -->
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <!-- Register service worker after Blazor loads -->
    <script>
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
    </script>
</body>

</html>
